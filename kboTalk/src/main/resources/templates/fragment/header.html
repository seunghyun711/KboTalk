<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="commonHead">
    <title>KBO TALK</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div th:fragment="header">
    <nav class="navbar navbar-expand-md bg-dark navbar-dark">
        <a class="navbar-brand" href="/">KBO TALK</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav">
                <!-- 항상 표시되는 메뉴 -->
                <li class="nav-item"><a class="nav-link" href="/board/saveForm">커뮤니티</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/updateForm">회원 정보</a></li>
                <li class="nav-item"><a class="nav-link" href="/notice">공지사항</a></li>
                <li class="nav-item"><a class="nav-link" href="/teamInfo">구단정보</a></li>
            </ul>

            <!-- 오른쪽 정렬 영역 -->
            <ul class="navbar-nav ms-auto">
                <th:block th:if="${sessionMember == null}">
                    <li class="nav-item"><a class="nav-link" href="/members/login">로그인</a></li>
                    <li class="nav-item"><a class="nav-link" href="/members/join">회원가입</a></li>
                </th:block>

                <th:block th:if="${sessionMember != null}">
                    <li class="nav-item">
                        <form th:action="@{/members/logout}"method="post">
                            <button class="w-100 btn btn-dark btn-lg" type="submit">로그아웃</button>
                        </form>
                    </li>
                    <li class="nav-item">
                        <span class="navbar-text text-white ms-2 me-2">
                            <strong th:text="${sessionMember.nickname} + ' 님'"></strong>
                        </span>
                    </li>
                </th:block>
            </ul>
        </div>
    </nav>
    <br>
</div>
</body>
</html>
