<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="commonHead">
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>
<div th:fragment="header">
    <nav class="navbar navbar-expand-md bg-dark navbar-dark">
        <a class="navbar-brand" href="/">KBO TALK</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <th:block th:choose>
                <th:block th:when="${#strings.isEmpty(principal)}">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="/auth/loginForm">로그인</a></li>
                        <!-- <li class="nav-item"><a class="nav-link" href="/auth/joinForm">회원가입</a></li> -->
                    </ul>
                </th:block>
                <th:block th:otherwise>
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="/board/saveForm">커뮤니티</a></li>
                        <li class="nav-item"><a class="nav-link" href="/user/updateForm">회원 정보</a></li>
                        <li class="nav-item"><a class="nav-link" href="/logout">공지사항</a></li>
                    </ul>
                </th:block>
            </th:block>
        </div>
    </nav>
    <br>
</div>
</body>
</html>
