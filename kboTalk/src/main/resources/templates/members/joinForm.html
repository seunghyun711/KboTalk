<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>KboTalk</title>

    <!-- 공통 Head 영역을 추가 -->
    <th:block th:replace="~{fragment/header :: commonHead}"></th:block>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- 회원가입 요청 js 파일 추가 -->
    <script th:src="@{/js/member/member.js}"></script>
    <!-- 닉네임 중복 확인용 JS 파일 추가 -->
    <script th:src="@{/js/member/nicknameCheck.js}"></script>
    <!-- 유저 아이디 중복 확인 js 파일 추가 -->
    <script th:src="@{/js/member/userIdCheck.js}"></script>

    <style>
        .container {
            max-width: 560px;
        }

        .field-error {
            border-color: #dc3545;
            color: #dc3545;
        }
    </style>
</head>

<body>

<!-- 헤더 추가 -->
<div th:replace="~{fragment/header :: header}"></div>

<div class="container">
    <div class="py-5 text-center">
        <h2>회원가입</h2>
    </div>
    <form action="item.html" th:action th:object="${member}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p class="field-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
        </div>
        <div>
            <label for="userId">로그인 ID</label>
            <input type="text" id="userId" th:field="*{userId}" class="form-control"
                   th:errorclass="field-error">
            <button type="button" class="btn btn-outline-secondary mt-2" id="checkUserIdBtn">중복 확인</button>
            <div class="field-error" th:errors="*{userId}"></div>
        </div>
        <div>
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" th:field="*{nickname}" class="form-control"
                   th:errorclass="field-error">
            <button type="button" class="btn btn-outline-secondary mt-2" id="checkNicknameBtn">중복 확인</button>
            <div class="field-error" th:errors="*{nickname}"></div>
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" class="form-control"
                   th:errorclass="field-error">
            <div class="field-error" th:errors="*{password}"></div>
        </div>
        <div>
            <label for="checkPassword">비밀번호 확인</label>
            <input type="password" id="checkPassword" th:field="*{checkPassword}" class="form-control"
                   th:errorclass="field-error">
<!--            <div class="col">-->
<!--                <button class="w-100 btn btn-primary btn-lg" type="submit">비밀번호 확인</button>-->
<!--            </div>-->
            <div class="field-error" th:errors="*{checkPassword}"></div>
        </div>
        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit">회원가입</button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg"
                        onclick="location.href='items.html'"
                        th:onclick="|location.href='@{/}'|"
                        type="button">취소</button>
            </div>
        </div>
    </form>
</div> <!-- /container -->

</body>
</html>
